<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/admin/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxe Looks Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (async () => {
        try {
          const res = await fetch('http://localhost:3001/api/site');
          const data = await res.json();
          if (data.favicon) {
            const favicon = data.favicon.startsWith('http') 
              ? data.favicon 
              : 'http://localhost:3001' + data.favicon;
            document.querySelector('link[rel="icon"]').href = favicon;
          }
        } catch (e) {
          console.log('Using default favicon');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
